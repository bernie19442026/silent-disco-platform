global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'silent-disco-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: '/api/admin/metrics'
    params:
      format: ['prometheus']

  - job_name: 'silent-disco-web'
    static_configs:
      - targets: ['web:3000']
    metrics_path: '/api/admin/metrics'
    params:
      format: ['prometheus']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'icecast'
    static_configs:
      - targets: ['icecast:8000']
    metrics_path: '/status-json.xsl'

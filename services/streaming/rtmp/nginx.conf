# ─────────────────────────────────────────────────────────────
# NGINX-RTMP — Ingest layer for Silent Disco Platform
# ─────────────────────────────────────────────────────────────
#
# Accepts RTMP pushes on port 1935 for streams named:
#   channel1, channel2, channel3, channel4
#
# Packages each stream as HLS (AAC) with 1-second segments
# for Safari/iOS compatibility.
#
# Serves HLS files via HTTP on port 8080 under /hls/<name>/
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        # ── Ingest application ───────────────────────────────
        application live {
            live on;
            record off;

            # Restrict push access to known encoder IPs
            # allow publish 10.0.0.0/8;
            # deny publish all;

            allow play all;

            # Notify on stream connect / disconnect (optional)
            # on_publish http://api:3001/rtmp/on-publish;
            # on_done    http://api:3001/rtmp/on-done;

            # HLS packaging — 1 s segments, 3-segment window (~3 s latency)
            hls on;
            hls_path /tmp/hls;
            hls_fragment 1s;
            hls_playlist_length 6s;
            hls_continuous on;
            hls_cleanup on;

            # Codec transcoding is handled by FFmpeg workers upstream;
            # NGINX-RTMP just repackages whatever arrives.

            # Push a copy to Icecast for Opus/Ogg delivery
            # (FFmpeg encoder worker handles this directly)
        }

        # ── Low-latency application (< 2 s) ─────────────────
        application lowlatency {
            live on;
            record off;
            allow play all;

            hls on;
            hls_path /tmp/hls-ll;
            hls_fragment 500ms;
            hls_playlist_length 3s;
            hls_continuous on;
            hls_cleanup on;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip for text content only (not audio)
    gzip on;
    gzip_types text/plain application/json application/vnd.apple.mpegurl;

    # ── HLS delivery server ──────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # CORS — required for browser cross-origin audio
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;

        # HLS files
        location /hls/ {
            alias /tmp/hls/;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
                audio/aac  aac;
            }

            add_header Cache-Control "no-cache, no-store";
            add_header Access-Control-Allow-Origin "*";

            # Byte-range for segment requests
            add_header Accept-Ranges bytes;
        }

        # Low-latency HLS
        location /hls-ll/ {
            alias /tmp/hls-ll/;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control "no-cache, no-store";
            add_header Access-Control-Allow-Origin "*";
        }

        # RTMP stats page
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location /stat.xsl {
            root /usr/local/nginx/html;
        }

        # Health probe
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
